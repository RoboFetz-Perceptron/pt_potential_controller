anchors:
  pose:
    id: "perceptron"
    pos_x: -1.0
    pos_y: 0.0
    pos_t: 0.0
    in_binding:
      #type: "pose_topic" # TODO: support topic types other than anchor defaut
      topic_name: "/own_pose"
    out_binding:
      #type: "cmd_vel_topic"
      topic_name: "/cmd_vel"
      frequency: 10.0
      max_vel_x: 5.0
      max_vel_y: 5.0
      max_vel_w: 5.0
      rotation_target: "enemy"
      w_pid_p: 1.0
      w_pid_i: 1.0
      w_pid_d: 1.0

  point:
    id: "enemy"
    pos_x: 1.0
    pos_y: 0.0
    in_binding:
      type: "pose_topic"
      topic_name: "/enemy_pose"
    potentials:
      constant: # f = const
        const: -1.5
      #linear: # f = lin*d
      #  lin: -1.0
      #exponential: # f = base^(exp*d)
        #f_sign_override: -1
        #base: 2.718281828
        #exp: 0.5
        #d_invert: true # take reciprocal of distance before calculating f
        #f_max: 10.0 # limit maximum force

  point:
    id: "obstacle"
    pos_x: 0.0
    pos_y: 1.0
    potentials:
      exponential:
        #sign_override: -1 # -1 ... always attract, 1 ... always repell
        base: 2.718281828
        exp: 0.1
        f_max: 50.0 # maximum repulsion higher than opponents attraction!

visualization:
  scale: 0.01 # world coordinate units per pixel
  width: 640  # window size in pixels
  height: 480
  center_x: 0.0 # center of window in world coordinates
  center_y: 0.0
  f_max: 50.0 # max. force to scale colors for
