included_scenario_yaml: "ws02/src/pt_potential_controller/config/scenarios/empty_arena.yaml"

anchors:
    pose:
      id: "perceptron"
      pos_topic: "/pt_pose"

    point:
      id: "enemy_secondary"
      pos_topic: "/enemy_secondary_pose"
      enabled: false
      potentials:
        linear: # avoid secondary enemy
          lin: 0.20

    line:
      id: "enemy_trajectory"
      pos_topic: "/enemy_trajectory"
      potentials:
        exponential:
          base: 2.718281828
          exp: 0.01
        constant: # counter min. force of 1 due to exponential function
          const: -1.0

visualization:
  scale: 0.005 # world coordinate units per pixel
  width: 400  # window size in pixels
  height: 400
  center_x: 0.0 # center of window in world coordinates
  center_y: 0.0
  show_forces: false
  f_max: 10.0 # max. force to scale colors for
