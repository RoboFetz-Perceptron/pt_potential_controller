anchors:
  pose:
    id: "perceptron"
    pos_topic: "/pt_pose"

  point:
    id: "enemy"
    pos_topic: "/enemy_pose"
    potentials:
      linear:
        lin: -0.25
        f_max: 0.5
        d_offset: 0.3
        d_invert: false
      linear:
        lin: 0.25
        angle_twist: 1.57
        f_max: 0.5
        f_sign_override: 1 # -1 ... always attract, 1 ... always repell
        d_offset: 0.3

  # line:
  #   id: "enemy_trajectory"
  #   pos_topic: "/enemy_trajectory"
  #   potentials:
  #     exponential:
  #       base: 2.718281828
  #       exp: 0.2
  #     constant: # counter min. force of 1 due to exponential function
  #       const: -1.0

  line:
    id: "wall_left"
    pos_x0: -0.75
    pos_y0:  0.75
    pos_x1: -0.75
    pos_y1: -0.75
    potentials:
      exponential:
        base: 2.718281828
        exp: 0.1

  line:
    id: "wall_right"
    pos_x0:  0.75
    pos_y0:  0.75
    pos_x1:  0.75
    pos_y1: -0.75
    potentials:
      exponential:
        base: 2.718281828
        exp: 0.1

  line:
    id: "wall_bottom"
    pos_x0: -0.75
    pos_y0: -0.75
    pos_x1:  0.75
    pos_y1: -0.75
    potentials:
      exponential:
        base: 2.718281828
        exp: 0.1

  line:
    id: "wall_top"
    pos_x0: -0.75
    pos_y0:  0.75
    pos_x1:  0.75
    pos_y1:  0.75
    potentials:
      exponential:
        base: 2.718281828
        exp: 0.1


visualization:
  scale: 0.005 # world coordinate units per pixel
  width: 400  # window size in pixels
  height: 400
  center_x: 0.0 # center of window in world coordinates
  center_y: 0.0
  show_forces: false
  f_max: 10.0 # max. force to scale colors for
