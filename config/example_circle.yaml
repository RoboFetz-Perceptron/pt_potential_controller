anchors:
  pose:
    id: "perceptron"
    pos_x: -1.0
    pos_y: 0.0
    pos_t: 0.0
    pos_topic: "/own_pose"

  point:
    id: "enemy"
    pos_x: 2.0
    pos_y: 0.0
    pos_topic: "/enemy_pose"
    potentials:
      linear:
        lin: -1.0
        f_max: 1.0
        d_offset: 1.0
        d_invert: false
      linear:
        lin: 1.0
        angle_twist: 1.57
        f_max: 0.5
        f_sign_override: 1 # -1 ... always attract, 1 ... always repell
        d_offset: 1.0

  line:
    id: "wall_left"
    pos_x0: -3.0
    pos_y0: -2.0
    pos_x1: -3.0
    pos_y1: 2.0
    potentials:
      exponential:
        base: 2.718281828
        exp: 0.1

  line:
    id: "wall_right"
    pos_x0: 3.0
    pos_y0: -2.0
    pos_x1: 3.0
    pos_y1: 2.0
    potentials:
      exponential:
        base: 2.718281828
        exp: 0.1

  line:
    id: "wall_bottom"
    pos_x0: -3.0
    pos_y0: -2.0
    pos_x1: 3.0
    pos_y1: -2.0
    potentials:
      exponential:
        base: 2.718281828
        exp: 0.1

  line:
    id: "wall_top"
    pos_x0: -3.0
    pos_y0: 2.0
    pos_x1: 3.0
    pos_y1: 2.0
    potentials:
      exponential:
        base: 2.718281828
        exp: 0.1


visualization:
  scale: 0.01 # world coordinate units per pixel
  width: 640  # window size in pixels
  height: 480
  center_x: 0.0 # center of window in world coordinates
  center_y: 0.0
  f_max: 1.0 # max. force to scale colors for
